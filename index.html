.login-gate{position:fixed;inset:0;z-index:9999;background:var(--shm-navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .3s}.login-gate.hidden{opacity:0;pointer-events:none}.login-logo{width:80px;height:80px}.login-title{font-family:'Barlow',sans-serif;font-size:18px;font-weight:600;letter-spacing:4px;color:#fff;text-transform:uppercase}.login-subtitle{font-size:13px;color:rgba(255,255,255,.4);font-family:'Barlow',sans-serif;margin-top:-14px}.login-form{display:flex;flex-direction:column;align-items:center;gap:12px;width:280px}.login-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:11px 14px;font-size:14px;font-family:'Barlow',sans-serif;color:#fff;outline:none;text-align:center;letter-spacing:1px;transition:border-color .15s}.login-input:focus{border-color:rgba(201,169,110,.5)}.login-input::placeholder{color:rgba(255,255,255,.25)}.login-btn{width:100%;background:var(--shm-gold);color:var(--shm-navy);border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;letter-spacing:.5px;transition:background .15s}.login-btn:hover{background:#d4b87a}.login-error{font-size:12px;color:#f87171;font-family:'Barlow',sans-serif;height:16px}
</style>

let state={view:'dashboard',active:[],backlog:[],filterCat:'All',filterHealth:'All',filterStatus:'All',filterLead:'All',search:'',expandedId:null,modal:null,addType:'active',theme:'light',syncMode:'local',lastHash:'',backlogFilterCat:'All',backlogFilterImpact:'All',expandAllActive:false,expandAllBacklog:false,expandAllLeads:false,expandDash:{}};
function dataHash(d){const s=JSON.stringify(d);return s.length+'-'+s.split('').reduce((a,b)=>{a=((a<<5)-a)+b.charCodeAt(0);return a&a},0);}
async function cloudRead(){try{const r=await fetch(CLOUD_URL);if(!r.ok)return null;return await r.json();}catch(e){return null;}}
async function cloudWrite(data){try{const r=await fetch(CLOUD_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return r.ok;}catch(e){return false;}}
async function loadData(){const d=await cloudRead();if(d&&d.active&&d.active.length>0){state.active=d.active;state.backlog=d.backlog||[];state.syncMode='cloud';state.lastHash=dataHash(d);return;}try{const r=localStorage.getItem(LOCAL_KEY);if(r){const ld=JSON.parse(r);if(ld.active&&ld.active.length>0){state.active=ld.active;state.backlog=ld.backlog||DEFAULT_BACKLOG;state.syncMode='cloud';return;}}}catch(e){}state.active=JSON.parse(JSON.stringify(DEFAULT_ACTIVE));state.backlog=JSON.parse(JSON.stringify(DEFAULT_BACKLOG));state.syncMode='cloud';const payload={active:state.active,backlog:state.backlog,lastModified:new Date().toISOString()};await cloudWrite(payload);}
async function saveData(){const payload={active:state.active,backlog:state.backlog,lastModified:new Date().toISOString()};try{localStorage.setItem(LOCAL_KEY,JSON.stringify(payload));}catch(e){}const ok=await cloudWrite(payload);if(ok)state.lastHash=dataHash(payload);updateSync(ok?'connected':'error');}
async function pollForUpdates(){try{const d=await cloudRead();if(!d)return;const h=dataHash(d);if(h!==state.lastHash&&!state.modal){state.active=d.active||state.active;state.backlog=d.backlog||state.backlog;state.lastHash=h;render();updateSync('connected');}}catch(e){updateSync('error');}}
function updateSync(s){const dot=document.querySelector('.sync-dot');const lbl=document.querySelector('.sync-label');if(dot)dot.className='sync-dot '+s;if(lbl)lbl.textContent=s==='connected'?'Live sync':s==='error'?'Sync error':'Connecting...';}

function setTheme(t){state.theme=t;document.documentElement.className=t==='dark'?'dark':'';try{localStorage.setItem('shm-theme',t);}catch(e){}}
function loadTheme(){try{const t=localStorage.getItem('shm-theme');if(t){state.theme=t;setTheme(t);}}catch(e){}}
function nextId(){return Date.now()+Math.floor(Math.random()*1000)}
function getLeads(){const s=new Set();state.active.forEach(p=>{if(p.lead)p.lead.split(',').map(x=>x.trim()).filter(Boolean).forEach(l=>s.add(l));});return[...s].sort();}
function getFiltered(){return state.active.filter(p=>{if(state.filterCat!=='All'&&p.category!==state.filterCat)return false;if(state.filterHealth!=='All'&&p.health!==state.filterHealth)return false;if(state.filterStatus!=='All'&&p.status!==state.filterStatus)return false;if(state.filterLead!=='All'&&!(p.lead||'').split(',').map(x=>x.trim()).includes(state.filterLead))return false;if(state.search){const q=state.search.toLowerCase();return(p.topic+' '+p.notes+' '+p.lead+' '+p.stakeholders).toLowerCase().includes(q);}return true;});}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function catOrder(cat){const order={'1. Revenue':0,'2. SY Commercial Excellence':1,'3. VCI':2,'4. MYC':3,'5. Strategic Business Relationships':4,'6. Miscellaneous':5};return order[cat]!==undefined?order[cat]:99;}
function sortByCat(arr){return[...arr].sort((a,b)=>catOrder(a.category)-catOrder(b.category));}
function hb(h){return '<span class="health-badge health-'+h+'"><span class="health-dot"></span>'+esc(h)+'</span>';}
function sb(s){return '<span class="status-badge status-'+(STATUS_CLASS[s]||'not-started')+'">'+esc(s)+'</span>';}

function render(){document.getElementById('app').innerHTML=rHeader()+rNav()+'<div class="content">'+rContent()+'</div>'+rModal()+rFooter();bind();}
function rHeader(){const il=state.theme==='light';const sc=state.syncMode==='cloud'?'connected':'local';const sl=state.syncMode==='cloud'?'Live sync':'Connecting...';return '<div class="shm-header"><div class="shm-header-top"><div class="shm-logo-group">'+COMPASS+'<span class="shm-wordmark">Safe Harbor Marinas</span></div></div><div class="shm-divider"></div><div class="shm-header-sub"><div class="shm-subtitle"><div class="shm-subtitle-icon">'+ANCHOR+'</div><h2>Skipper\'s Log</h2><span>Revenue Management &mdash; CRO Dashboard</span></div><div class="header-actions"><div class="sync-indicator"><span class="sync-dot '+sc+'"></span><span class="sync-label">'+sl+'</span></div><div class="theme-toggle"><button data-action="set-theme" data-val="light" class="'+(il?'active':'')+'">&#9788; Light</button><button data-action="set-theme" data-val="dark" class="'+(!il?'active':'')+'">&#9790; Dark</button></div><button class="btn btn-primary" data-action="open-add"><span style="font-size:15px;line-height:1">+</span> Add Project</button></div></div></div>';}
function rNav(){const items=[{k:'dashboard',l:'Dashboard',i:'&#9673;'},{k:'active',l:'Active',i:'&#9654;'},{k:'backlog',l:'Backlog',i:'&#9208;'},{k:'leads',l:'By Owner',i:'&#9678;'}];return '<div class="nav">'+items.map(n=>'<button class="nav-btn '+(state.view===n.k?'active':'')+'" data-nav="'+n.k+'"><span class="nav-icon">'+n.i+'</span> '+n.l+'</button>').join('')+'</div>';}
function rContent(){switch(state.view){case 'dashboard':return rDash();case 'active':return rActive();case 'backlog':return rBacklog();case 'leads':return rLeads();default:return '';}}
function rDash(){const a=state.active,g=a.filter(p=>p.health==='Green').length,y=a.filter(p=>p.health==='Yellow').length,r=a.filter(p=>p.health==='Red').length,ip=a.filter(p=>p.status==='In Progress').length,c=a.filter(p=>p.status==='Completed').length,pg=a.length?Math.round(g/a.length*100):0;const py=a.length?Math.round(y/a.length*100):0;const pr=a.length?Math.round(r/a.length*100):0;let h='<div class="stats-row"><div class="stat-card"><div class="stat-label">Active Projects</div><div class="stat-value">'+a.length+'</div><div class="stat-sub">'+state.backlog.length+' backlogged</div></div><div class="stat-card"><div class="stat-label">On Track</div><div class="stat-value" style="color:var(--green)">'+g+'</div><div class="stat-sub">'+pg+'% of active</div></div><div class="stat-card"><div class="stat-label">Needs Attention</div><div class="stat-value" style="color:var(--yellow)">'+y+'</div><div class="stat-sub">'+py+'% of active</div></div><div class="stat-card"><div class="stat-label">At Risk</div><div class="stat-value" style="color:var(--red)">'+r+'</div><div class="stat-sub">'+pr+'% of active</div></div></div>';h+='<div class="section-title">Category Breakdown</div><div class="cat-grid">';CATEGORIES.forEach(cat=>{const items=a.filter(p=>p.category===cat);if(!items.length)return;const gn=items.filter(p=>p.health==='Green').length,yn=items.filter(p=>p.health==='Yellow').length,rn=items.filter(p=>p.health==='Red').length,tn=items.filter(p=>p.health==='TBD').length;h+='<div class="cat-card" data-action="filter-cat" data-cat="'+esc(cat)+'"><div class="cat-name">'+esc(CAT_SHORT[cat])+'</div><div class="cat-count">'+items.length+'</div><div class="cat-bar">'+(gn?'<div class="cat-bar-seg" style="flex:'+gn+';background:var(--green)"></div>':'')+(yn?'<div class="cat-bar-seg" style="flex:'+yn+';background:var(--yellow)"></div>':'')+(rn?'<div class="cat-bar-seg" style="flex:'+rn+';background:var(--red)"></div>':'')+(tn?'<div class="cat-bar-seg" style="flex:'+tn+';background:var(--tbd)"></div>':'')+'</div><div class="cat-meta">'+gn+' green &middot; '+yn+' yellow &middot; '+rn+' red &middot; '+tn+' TBD</div></div>';});h+='</div>';const atRisk=a.filter(p=>p.health==='Red');const needsAtt=a.filter(p=>p.health==='Yellow');const noStatus=a.filter(p=>p.health==='TBD');const unassigned=a.filter(p=>!p.lead||p.lead.trim()==='');function dashRow(p,expanded){var h='<div class="project-row'+(expanded?' expanded':'')+'" data-action="'+(expanded?'edit-active':'edit-active')+'" data-id="'+p.id+'">'+hb(p.health)+'<div class="project-topic">'+esc(p.topic)+'<span class="topic-cat">'+esc(CAT_SHORT[p.category])+'</span></div><div class="project-lead">'+esc(p.lead||'Unassigned')+'</div>'+sb(p.status)+'</div>';if(expanded){h+='<div class="project-detail">'+(p.stakeholders?'<div style="margin-bottom:6px"><span class="detail-label">Stakeholders: </span><span class="detail-value">'+esc(p.stakeholders)+'</span></div>':'')+(p.notes?'<div class="detail-value">'+esc(p.notes)+'</div>':'<div class="detail-value" style="color:var(--text-muted);font-style:italic">No notes yet</div>')+'</div>';}return h;}if(atRisk.length){h+='<div style="display:flex;align-items:center;margin-bottom:14px"><div class="attention-title" style="color:var(--red);margin-bottom:0">&#9888; Items at Risk</div><button class="expand-toggle '+(state.expandDash.risk?'active':'')+'" data-action="toggle-dash-expand" data-section="risk">'+(state.expandDash.risk?'&#9660; Collapse':'&#9654; Expand')+' All</button></div>';sortByCat(atRisk).forEach(p=>{h+=dashRow(p,state.expandDash.risk);});h+='<div style="height:18px"></div>';}if(needsAtt.length){h+='<div style="display:flex;align-items:center;margin-bottom:14px"><div class="attention-title" style="margin-bottom:0">&#9888; Items Needing Attention</div><button class="expand-toggle '+(state.expandDash.attention?'active':'')+'" data-action="toggle-dash-expand" data-section="attention">'+(state.expandDash.attention?'&#9660; Collapse':'&#9654; Expand')+' All</button></div>';sortByCat(needsAtt).forEach(p=>{h+=dashRow(p,state.expandDash.attention);});h+='<div style="height:18px"></div>';}if(noStatus.length){h+='<div style="display:flex;align-items:center;margin-bottom:14px"><div class="attention-title" style="color:var(--tbd);margin-bottom:0">&#9898; Items with No Status</div><button class="expand-toggle '+(state.expandDash.noStatus?'active':'')+'" data-action="toggle-dash-expand" data-section="noStatus">'+(state.expandDash.noStatus?'&#9660; Collapse':'&#9654; Expand')+' All</button></div>';sortByCat(noStatus).forEach(p=>{h+=dashRow(p,state.expandDash.noStatus);});h+='<div style="height:18px"></div>';}if(unassigned.length){h+='<div style="display:flex;align-items:center;margin-bottom:14px"><div class="attention-title" style="color:var(--text-secondary);margin-bottom:0">&#9711; Unassigned Items</div><button class="expand-toggle '+(state.expandDash.unassigned?'active':'')+'" data-action="toggle-dash-expand" data-section="unassigned">'+(state.expandDash.unassigned?'&#9660; Collapse':'&#9654; Expand')+' All</button></div>';sortByCat(unassigned).forEach(p=>{h+=dashRow(p,state.expandDash.unassigned);});}return h;}
function rActive(){const leads=getLeads(),filtered=getFiltered(),hf=state.filterCat!=='All'||state.filterHealth!=='All'||state.filterStatus!=='All'||state.filterLead!=='All'||state.search;let h='<div class="filter-bar"><input type="text" placeholder="Search projects..." value="'+esc(state.search)+'" data-filter="search"><select data-filter="cat"><option value="All">All Categories</option>'+CATEGORIES.map(c=>'<option value="'+esc(c)+'" '+(state.filterCat===c?'selected':'')+'>'+esc(CAT_SHORT[c])+'</option>').join('')+'</select><select data-filter="health"><option value="All">All Health</option>'+HEALTH_OPTIONS.map(x=>'<option value="'+x+'" '+(state.filterHealth===x?'selected':'')+'>'+x+'</option>').join('')+'</select><select data-filter="status"><option value="All">All Status</option>'+STATUS_OPTIONS.map(s=>'<option value="'+esc(s)+'" '+(state.filterStatus===s?'selected':'')+'>'+esc(s)+'</option>').join('')+'</select><select data-filter="lead"><option value="All">All Owners</option>'+leads.map(l=>'<option value="'+esc(l)+'" '+(state.filterLead===l?'selected':'')+'>'+esc(l)+'</option>').join('')+'</select>'+(hf?'<button class="btn btn-ghost" data-action="clear-filters">Clear filters</button>':'')+'<button class="expand-toggle '+(state.expandAllActive?'active':'')+' " data-action="toggle-expand-active">'+(state.expandAllActive?'&#9660; Collapse':'&#9654; Expand')+' All</button><span class="filter-count">'+filtered.length+' projects</span></div>';const gr={};filtered.forEach(p=>{if(!gr[p.category])gr[p.category]=[];gr[p.category].push(p);});Object.keys(gr).sort((a,b)=>catOrder(a)-catOrder(b)).forEach(cat=>{h+='<div class="project-group"><div class="section-title">'+esc(CAT_SHORT[cat])+'</div>';gr[cat].forEach(p=>{h+=rRow(p);});h+='</div>';});if(!filtered.length)h+='<div style="text-align:center;padding:60px 0;color:var(--text-muted)">No projects match your filters</div>';return h;}
function rRow(p){const o=state.expandAllActive||state.expandedId===p.id;let h='<div class="project-row '+(o?'expanded':'')+'" data-action="toggle" data-id="'+p.id+'">'+hb(p.health)+'<div class="project-topic">'+esc(p.topic)+'<span class="topic-cat">'+esc(CAT_SHORT[p.category])+'</span></div><div class="project-lead">'+esc(p.lead||'')+'</div>'+sb(p.status)+'<span class="expand-arrow '+(o?'open':'')+'">&#9660;</span></div>';if(o){h+='<div class="project-detail">'+(p.stakeholders?'<div style="margin-bottom:6px"><span class="detail-label">Stakeholders: </span><span class="detail-value">'+esc(p.stakeholders)+'</span></div>':'')+(p.notes?'<div class="detail-value">'+esc(p.notes)+'</div>':'<div class="detail-value" style="color:var(--text-muted);font-style:italic">No notes yet</div>')+'<div class="detail-actions"><button class="btn btn-sm btn-edit" data-action="edit-active" data-id="'+p.id+'">Edit</button><button class="btn btn-sm btn-warn" data-action="to-backlog" data-id="'+p.id+'">&rarr; Backlog</button><button class="btn btn-sm btn-danger" data-action="delete-active" data-id="'+p.id+'">Delete</button></div></div>';}return h;}
function rBacklog(){const bFiltered=state.backlog.filter(p=>{if(state.backlogFilterCat!=='All'&&p.category!==state.backlogFilterCat)return false;if(state.backlogFilterImpact!=='All'&&(p.impact||'TBD')!==state.backlogFilterImpact)return false;return true;});const bHasFilter=state.backlogFilterCat!=='All'||state.backlogFilterImpact!=='All';let h='<div class="section-title" style="margin-bottom:14px">Backlogged Projects <span style="font-weight:400;color:var(--text-muted)">('+bFiltered.length+')</span></div>';h+='<div class="filter-bar" style="margin-bottom:14px"><button class="expand-toggle '+(state.expandAllBacklog?'active':'')+'" data-action="toggle-expand-backlog">'+(state.expandAllBacklog?'&#9660; Collapse':'&#9654; Expand')+' All</button><select data-filter="backlog-cat"><option value="All">All Categories</option>'+CATEGORIES.map(c=>'<option value="'+esc(c)+'" '+(state.backlogFilterCat===c?'selected':'')+'>'+esc(CAT_SHORT[c])+'</option>').join('')+'</select><select data-filter="backlog-impact"><option value="All">All Impact</option>'+IMPACT_OPTIONS.map(i=>'<option value="'+i+'" '+(state.backlogFilterImpact===i?'selected':'')+'>'+i+'</option>').join('')+'</select>'+(bHasFilter?'<button class="btn btn-ghost" data-action="clear-backlog-filters">Clear filters</button>':'')+'</div>';sortByCat(bFiltered).forEach(p=>{const o=state.expandAllBacklog||state.expandedId===p.id;h+='<div class="backlog-row '+(o?'expanded':'')+'" data-action="toggle" data-id="'+p.id+'"><span class="backlog-cat">'+esc(CAT_SHORT[p.category])+'</span><span class="backlog-topic">'+esc(p.topic)+'</span><span class="expand-arrow '+(o?'open':'')+'">&#9660;</span></div>';if(o){h+='<div class="project-detail">'+(p.notes?'<div class="detail-value">'+esc(p.notes)+'</div>':'<div class="detail-value" style="color:var(--text-muted);font-style:italic">No notes</div>')+'<div class="detail-actions"><button class="btn btn-sm btn-edit" data-action="edit-backlog" data-id="'+p.id+'">Edit</button><button class="btn btn-sm btn-success" data-action="activate" data-id="'+p.id+'">Activate &rarr;</button><button class="btn btn-sm btn-danger" data-action="delete-backlog" data-id="'+p.id+'">Delete</button></div></div>';}});if(!bFiltered.length)h+='<div style="text-align:center;padding:60px 0;color:var(--text-muted)">'+(bHasFilter?'No backlog items match your filters':'No backlogged items')+'</div>';return h;}
function rLeads(){const leads=getLeads();const oleads=getLeads();let h='<div class="filter-bar" style="margin-bottom:18px"><select data-filter="cat"><option value="All">All Categories</option>'+CATEGORIES.map(c=>'<option value="'+esc(c)+'" '+(state.filterCat===c?'selected':'')+'>'+esc(CAT_SHORT[c])+'</option>').join('')+'</select><select data-filter="health"><option value="All">All Health</option>'+HEALTH_OPTIONS.map(x=>'<option value="'+x+'" '+(state.filterHealth===x?'selected':'')+'>'+x+'</option>').join('')+'</select><select data-filter="status"><option value="All">All Status</option>'+STATUS_OPTIONS.map(s=>'<option value="'+esc(s)+'" '+(state.filterStatus===s?'selected':'')+'>'+esc(s)+'</option>').join('')+'</select><select data-filter="lead"><option value="All">All Owners</option>'+oleads.map(l=>'<option value="'+esc(l)+'" '+(state.filterLead===l?'selected':'')+'>'+esc(l)+'</option>').join('')+'</select>'+(state.filterCat!=='All'||state.filterHealth!=='All'||state.filterStatus!=='All'||state.filterLead!=='All'?'<button class="btn btn-ghost" data-action="clear-filters">Clear filters</button>':'')+'<button class="expand-toggle '+(state.expandAllLeads?'active':'')+'" data-action="toggle-expand-leads">'+(state.expandAllLeads?'&#9660; Collapse':'&#9654; Expand')+' All</button></div>';leads.forEach(lead=>{if(state.filterLead!=='All'&&lead!==state.filterLead)return;const items=sortByCat(state.active.filter(p=>{if(!(p.lead||'').split(',').map(x=>x.trim()).includes(lead))return false;if(state.filterCat!=='All'&&p.category!==state.filterCat)return false;if(state.filterHealth!=='All'&&p.health!==state.filterHealth)return false;if(state.filterStatus!=='All'&&p.status!==state.filterStatus)return false;return true;}));if(!items.length)return;h+='<div class="owner-group"><div class="owner-header"><div class="owner-avatar">'+esc(lead[0])+'</div><span class="owner-name">'+esc(lead)+'</span><span class="owner-count">'+items.length+' project'+(items.length!==1?'s':'')+'</span></div><div class="owner-projects">';items.forEach(p=>{const oe=state.expandAllLeads;h+='<div class="project-row'+(oe?' expanded':'')+'" data-action="edit-active" data-id="'+p.id+'">'+hb(p.health)+'<div class="project-topic">'+esc(p.topic)+'<span class="topic-cat">'+esc(CAT_SHORT[p.category])+'</span></div>'+sb(p.status)+'</div>';if(oe){h+='<div class="project-detail">'+(p.stakeholders?'<div style="margin-bottom:6px"><span class="detail-label">Stakeholders: </span><span class="detail-value">'+esc(p.stakeholders)+'</span></div>':'')+(p.notes?'<div class="detail-value">'+esc(p.notes)+'</div>':'<div class="detail-value" style="color:var(--text-muted);font-style:italic">No notes yet</div>')+'</div>';}});h+='</div></div>';});const ua=state.filterLead!=='All'?[]:sortByCat(state.active.filter(p=>{if(p.lead&&p.lead.trim()!=='')return false;if(state.filterCat!=='All'&&p.category!==state.filterCat)return false;if(state.filterHealth!=='All'&&p.health!==state.filterHealth)return false;if(state.filterStatus!=='All'&&p.status!==state.filterStatus)return false;return true;}));if(ua.length){h+='<div class="owner-group"><div class="owner-header"><div class="owner-avatar unassigned">?</div><span class="owner-name" style="color:var(--text-secondary)">Unassigned</span><span class="owner-count">'+ua.length+'</span></div><div class="owner-projects">';ua.forEach(p=>{const oe=state.expandAllLeads;h+='<div class="project-row'+(oe?' expanded':'')+'" data-action="edit-active" data-id="'+p.id+'">'+hb(p.health)+'<div class="project-topic">'+esc(p.topic)+'<span class="topic-cat">'+esc(CAT_SHORT[p.category])+'</span></div>'+sb(p.status)+'</div>';if(oe){h+='<div class="project-detail">'+(p.stakeholders?'<div style="margin-bottom:6px"><span class="detail-label">Stakeholders: </span><span class="detail-value">'+esc(p.stakeholders)+'</span></div>':'')+(p.notes?'<div class="detail-value">'+esc(p.notes)+'</div>':'<div class="detail-value" style="color:var(--text-muted);font-style:italic">No notes yet</div>')+'</div>';}});h+='</div></div>';}return h;}
function rModal(){if(!state.modal)return '';const m=state.modal;if(m.type==='add')return rAddM();if(m.type==='edit-active')return rEAM(m.item);if(m.type==='edit-backlog')return rEBM(m.item);return '';}
function rEAM(i){return '<div class="modal-overlay" data-action="close-modal"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">Edit Project</div><button class="modal-close" data-action="close-modal">&times;</button></div><div class="field"><label class="field-label">Topic</label><input type="text" id="m-topic" value="'+esc(i.topic)+'"></div><div class="field-row"><div class="field"><label class="field-label">Category</label><select id="m-cat">'+CATEGORIES.map(c=>'<option value="'+esc(c)+'" '+(i.category===c?'selected':'')+'>'+esc(c)+'</option>').join('')+'</select></div><div class="field"><label class="field-label">Health</label><select id="m-health">'+HEALTH_OPTIONS.map(h=>'<option value="'+h+'" '+(i.health===h?'selected':'')+'>'+h+'</option>').join('')+'</select></div></div><div class="field-row"><div class="field"><label class="field-label">Status</label><select id="m-status">'+STATUS_OPTIONS.map(s=>'<option value="'+esc(s)+'" '+(i.status===s?'selected':'')+'>'+esc(s)+'</option>').join('')+'</select></div><div class="field"><label class="field-label">Lead(s)</label><input type="text" id="m-lead" value="'+esc(i.lead)+'" placeholder="e.g. Anton, Nick"></div></div><div class="field"><label class="field-label">Other Stakeholders</label><input type="text" id="m-stakeholders" value="'+esc(i.stakeholders)+'" placeholder="e.g. Jeremy, Carolina"></div><div class="field"><label class="field-label">Notes / Updates</label><textarea id="m-notes" rows="5">'+esc(i.notes)+'</textarea></div><div class="modal-actions"><button class="btn btn-save" data-action="save-edit-active" data-id="'+i.id+'">Save Changes</button><button class="btn btn-cancel" data-action="close-modal">Cancel</button></div></div></div>';}
function rEBM(i){return '<div class="modal-overlay" data-action="close-modal"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">Edit Backlog Item</div><button class="modal-close" data-action="close-modal">&times;</button></div><div class="field"><label class="field-label">Topic</label><input type="text" id="m-topic" value="'+esc(i.topic)+'"></div><div class="field-row"><div class="field"><label class="field-label">Category</label><select id="m-cat">'+CATEGORIES.map(c=>'<option value="'+esc(c)+'" '+(i.category===c?'selected':'')+'>'+esc(c)+'</option>').join('')+'</select></div><div class="field"><label class="field-label">Business Impact</label><select id="m-impact">'+IMPACT_OPTIONS.map(x=>'<option value="'+x+'" '+((i.impact||'TBD')===x?'selected':'')+'>'+x+'</option>').join('')+'</select></div></div><div class="field"><label class="field-label">Notes</label><textarea id="m-notes" rows="4">'+esc(i.notes)+'</textarea></div><div class="modal-actions"><button class="btn btn-save" data-action="save-edit-backlog" data-id="'+i.id+'">Save Changes</button><button class="btn btn-cancel" data-action="close-modal">Cancel</button></div></div></div>';}
function rAddM(){const ia=state.addType==='active';return '<div class="modal-overlay" data-action="close-modal"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">Add New Project</div><button class="modal-close" data-action="close-modal">&times;</button></div><div class="type-toggle"><button class="btn '+(ia?'active':'')+'" data-action="set-add-type" data-val="active">Active Project</button><button class="btn '+(!ia?'active':'')+'" data-action="set-add-type" data-val="backlog">Backlog Item</button></div><div class="field"><label class="field-label">Topic</label><input type="text" id="m-topic" value="" placeholder="Project name"></div><div class="field"><label class="field-label">Category</label><select id="m-cat">'+CATEGORIES.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('')+'</select></div>'+(ia?'<div class="field-row"><div class="field"><label class="field-label">Health</label><select id="m-health">'+HEALTH_OPTIONS.map(h=>'<option value="'+h+'" '+(h==='TBD'?'selected':'')+'>'+h+'</option>').join('')+'</select></div><div class="field"><label class="field-label">Status</label><select id="m-status">'+STATUS_OPTIONS.map(s=>'<option value="'+esc(s)+'">'+esc(s)+'</option>').join('')+'</select></div></div><div class="field"><label class="field-label">Lead(s)</label><input type="text" id="m-lead" value="" placeholder="e.g. Anton"></div><div class="field"><label class="field-label">Stakeholders</label><input type="text" id="m-stakeholders" value=""></div>':'<div class="field"><label class="field-label">Business Impact</label><select id="m-impact">'+IMPACT_OPTIONS.map(x=>'<option value="'+x+'">'+x+'</option>').join('')+'</select></div>')+'<div class="field"><label class="field-label">Notes</label><textarea id="m-notes" rows="3"></textarea></div><div class="modal-actions"><button class="btn btn-save" data-action="save-add">Add Project</button><button class="btn btn-cancel" data-action="close-modal">Cancel</button></div></div></div>';}
function rFooter(){const d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});const mn=state.syncMode==='cloud'?'Live sync via npoint.io':'Data saved in your browser';return '<div class="footer"><span class="footer-note">Last updated: '+d+' &middot; '+mn+'</span></div>';}

function bind(){
document.querySelectorAll('[data-nav]').forEach(el=>{el.onclick=()=>{state.view=el.dataset.nav;state.expandedId=null;render();};});
document.querySelectorAll('[data-action]').forEach(el=>{el.onclick=e=>{const a=el.dataset.action,id=parseInt(el.dataset.id);switch(a){
case 'toggle':e.stopPropagation();state.expandedId=state.expandedId===id?null:id;render();break;
case 'edit-active':e.stopPropagation();{const p=state.active.find(x=>x.id===id);if(p){state.modal={type:'edit-active',item:{...p}};state.expandedId=null;render();}}break;
case 'edit-backlog':e.stopPropagation();{const p=state.backlog.find(x=>x.id===id);if(p){state.modal={type:'edit-backlog',item:{...p}};render();}}break;
case 'save-edit-active':e.stopPropagation();{const t=document.getElementById('m-topic').value.trim();if(!t)return;state.active=state.active.map(p=>p.id===id?{...p,topic:t,category:document.getElementById('m-cat').value,health:document.getElementById('m-health').value,status:document.getElementById('m-status').value,lead:document.getElementById('m-lead').value.trim(),stakeholders:document.getElementById('m-stakeholders').value.trim(),notes:document.getElementById('m-notes').value.trim()}:p);state.modal=null;saveData();render();}break;
case 'save-edit-backlog':e.stopPropagation();{const t=document.getElementById('m-topic').value.trim();if(!t)return;state.backlog=state.backlog.map(p=>p.id===id?{...p,topic:t,category:document.getElementById('m-cat').value,impact:document.getElementById('m-impact').value,notes:document.getElementById('m-notes').value.trim()}:p);state.modal=null;saveData();render();}break;
case 'to-backlog':e.stopPropagation();{const p=state.active.find(x=>x.id===id);if(p){state.active=state.active.filter(x=>x.id!==id);state.backlog.push({id:nextId(),category:p.category,topic:p.topic,impact:'TBD',notes:p.notes});state.expandedId=null;saveData();render();}}break;
case 'activate':e.stopPropagation();{const p=state.backlog.find(x=>x.id===id);if(p){state.backlog=state.backlog.filter(x=>x.id!==id);state.active.push({id:nextId(),category:p.category,topic:p.topic,health:'TBD',status:'Not Started',lead:'',stakeholders:'',notes:p.notes||''});state.expandedId=null;saveData();render();}}break;
case 'delete-active':e.stopPropagation();state.active=state.active.filter(x=>x.id!==id);state.expandedId=null;saveData();render();break;
case 'delete-backlog':e.stopPropagation();state.backlog=state.backlog.filter(x=>x.id!==id);state.expandedId=null;saveData();render();break;
case 'open-add':state.addType=state.view==='backlog'?'backlog':'active';state.modal={type:'add'};render();break;
case 'close-modal':state.modal=null;render();break;
case 'set-add-type':{state.addType=el.dataset.val;const ct=document.getElementById('m-topic')?.value||'',cn=document.getElementById('m-notes')?.value||'';render();if(document.getElementById('m-topic'))document.getElementById('m-topic').value=ct;if(document.getElementById('m-notes'))document.getElementById('m-notes').value=cn;}break;
case 'save-add':e.stopPropagation();{const t=document.getElementById('m-topic').value.trim();if(!t)return;if(state.addType==='active'){state.active.push({id:nextId(),topic:t,category:document.getElementById('m-cat').value,health:document.getElementById('m-health').value,status:document.getElementById('m-status').value,lead:document.getElementById('m-lead')?.value.trim()||'',stakeholders:document.getElementById('m-stakeholders')?.value.trim()||'',notes:document.getElementById('m-notes').value.trim()});}else{state.backlog.push({id:nextId(),topic:t,category:document.getElementById('m-cat').value,impact:document.getElementById('m-impact')?.value||'TBD',notes:document.getElementById('m-notes').value.trim()});}state.modal=null;saveData();render();}break;
case 'clear-filters':state.filterCat='All';state.filterHealth='All';state.filterStatus='All';state.filterLead='All';state.search='';render();break;
case 'clear-backlog-filters':state.backlogFilterCat='All';state.backlogFilterImpact='All';render();break;
case 'filter-cat':state.view='active';state.filterCat=el.dataset.cat;state.filterHealth='All';state.filterStatus='All';state.filterLead='All';state.search='';state.expandedId=null;render();break;
case 'set-theme':setTheme(el.dataset.val);render();break;
case 'toggle-expand-active':state.expandAllActive=!state.expandAllActive;if(state.expandAllActive)state.expandedId=null;render();break;
case 'toggle-expand-backlog':state.expandAllBacklog=!state.expandAllBacklog;if(state.expandAllBacklog)state.expandedId=null;render();break;
case 'toggle-expand-leads':state.expandAllLeads=!state.expandAllLeads;render();break;
case 'toggle-dash-expand':{const sec=el.dataset.section;state.expandDash[sec]=!state.expandDash[sec];render();}break;

}};});
const si=document.querySelector('[data-filter="search"]');if(si){si.oninput=e=>{state.search=e.target.value;render();};setTimeout(()=>{const el=document.querySelector('[data-filter="search"]');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},0);}
document.querySelectorAll('[data-filter="cat"]').forEach(el=>{el.onchange=()=>{state.filterCat=el.value;render();};});
document.querySelectorAll('[data-filter="health"]').forEach(el=>{el.onchange=()=>{state.filterHealth=el.value;render();};});
document.querySelectorAll('[data-filter="status"]').forEach(el=>{el.onchange=()=>{state.filterStatus=el.value;render();};});
document.querySelectorAll('[data-filter="lead"]').forEach(el=>{el.onchange=()=>{state.filterLead=el.value;render();};});
document.querySelectorAll('[data-filter="backlog-cat"]').forEach(el=>{el.onchange=()=>{state.backlogFilterCat=el.value;render();};});
document.querySelectorAll('[data-filter="backlog-impact"]').forEach(el=>{el.onchange=()=>{state.backlogFilterImpact=el.value;render();};});
document.onkeydown=e=>{if(e.key==='Escape'&&state.modal){state.modal=null;render();}};
}
(async function(){loadTheme();await loadData();render();setInterval(pollForUpdates,POLL_INTERVAL);})();
</script>
